name: env-doctor

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: neerav34/env-doctor-action@v1
        with:
          ignore: |
            tests/**
            **/*.md
            **/*.d.ts
